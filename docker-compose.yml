version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mycurrency_user
      POSTGRES_PASSWORD: mycurrency_password
      POSTGRES_DB: mycurrency_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
