services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mycurrency_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mycurrency_password}
      POSTGRES_DB: ${POSTGRES_DB:-mycurrency_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mycurrency_db}
      - POSTGRES_USER=${POSTGRES_USER:-mycurrency_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mycurrency_password}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CURRENCY_BEACON_API_KEY=${CURRENCY_BEACON_API_KEY}
    depends_on:
      - db

volumes:
  postgres_data:
